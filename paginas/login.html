<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - DU7 IMPORTS</title>

    <link rel="stylesheet" href="../css/style_estutura_pagina.css">
    <link rel="stylesheet" href="../css/style_login_cadastro.css">

</head>

<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">
            <a href="../index.html">DU7 IMPORTS</a>
        </div>

        <nav id="menu">

            <ul>

                <li><a href="../index.html">Início</a></li>

                <li><a href="cadastro.html">Cadastro</a></li>

                <li><a href="login.html">Login</a></li>

                <li><a href="sobre.html">Sobre</a></li>

                <li>
                    <a href="carrinho.html">
                        <img src="../imagens/icones/carrinho.png" alt="Carrinho">
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <section class="formulario">

        <h1>Entrar</h1>

        <form id="formLogin">

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required>

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required>

            <button
                type="submit"
                class="btn-add">

                Entrar

            </button>

        </form>

        <p>

            Ainda não possui uma conta?

            <a href="cadastro.html">

                Cadastre-se

            </a>

        </p>

    </section>

    <footer id="rodape">

        <h2>&copy; 2026 DU7 IMPORTS</h2>

        <p>
            Formas de pagamento: Pix, Cartões de Débito e Crédito.
        </p>

    </footer>

</main>

<script src="../js/login.js"></script>

</body>

</html>
